# Development/Testing Configuration
# Low resource requirements, temporary storage
# Perfect for quick testing and development

prometheus:
  enabled: true
  prometheusSpec:
    retention: 2d
    retentionSize: "5GiB"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 250m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        metadata:
          name: prom-storage
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  adminPassword: admin123
  persistence:
    enabled: true
    size: 3Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  enabled: true
  manageCrds: true

defaultRules:
  create: false
