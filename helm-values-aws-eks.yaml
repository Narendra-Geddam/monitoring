# AWS EKS Environment - EBS Dynamic Provisioning
# Uses AWS EBS volumes with dynamic provisioning
# Supports gp3 (recommended), gp2, io1, io2 volume types

prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    retentionSize: "50GiB"
    
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    
    # AWS EBS Dynamic Provisioning
    storageSpec:
      volumeClaimTemplate:
        spec:
          # AWS EBS StorageClass - default: "gp3" (exists in EKS 1.24+)
          # Alternatives: "gp2", "io1", "io2"
          storageClassName: "gp3"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50GiB
    
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  adminPassword: admin123
  
  persistence:
    enabled: true
    storageClassName: "gp3"  # AWS EBS gp3
    size: 10GiB
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "gp3"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  enabled: true
  manageCrds: true

# Scale up for production EKS
prometheus:
  service:
    type: ClusterIP
    port: 80
    targetPort: 9090

grafana:
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  
  # Multiple replicas for HA in production
  replicas: 2

defaultRules:
  create: true
  rules:
    alertmanager: true
    general: true
    k8s: true
    kubelet: true
    kubeStateMetrics: true
    node: true
    prometheus: true
    prometheusOperator: true
