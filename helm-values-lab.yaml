# Lab Environment - Local-Path Storage (No CSI Drivers)
# For on-premises Kubernetes, Minikube, or clusters without cloud provisioners
# Uses local-path provisioner or similar local storage solutions

prometheus:
  enabled: true
  
  # Lab: Expose via NodePort (no port-forward needed)
  service:
    type: NodePort
    nodePort: 30090
  
  prometheusSpec:
    retention: 7d
    retentionSize: "10GiB"
    
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi
    
    # Local-path storage (lab environment)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-path"  # or "hostpath", "rancher-local-path"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  adminPassword: admin123
  
  # Lab: Expose via NodePort (no port-forward needed)
  service:
    type: NodePort
    nodePort: 30300
  
  persistence:
    enabled: true
    storageClassName: "local-path"
    size: 5Gi
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

alertmanager:
  enabled: false

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false

prometheusOperator:
  enabled: true
  manageCrds: true

defaultRules:
  create: false
